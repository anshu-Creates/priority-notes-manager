<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="js.css" />
  </head>
  <body>
    <div class="notes">
      <nav class="nav">
        <button class="add button">Add</button>
        <button class="delete button">Delete</button>
      </nav>
      <div class="main">
        <div class="black card">
          <h1>Name</h1>
          <p>Hometown : <span>Hometown</span></p>
          <p>Purpose : <span>Purpose</span></p>
          <div>
            <button class="call button">Call</button>
            <button class="msg button">Email</button>
          </div>
        </div>

        
      </div>

      <div class="filter">
        <button class="black">No Rush</button>
        <button class="violet">Important</button>
        <button class="orange">Emergency</button>
        <button class="blue">Urgent</button>
      </div>
    </div>

    <form>
      <h1>New Note</h1>
      <p>Full Name of the Person</p>
      <input type="text" placeholder="Enter Full Name" required/>
      <p style="margin-top: 10px">Home Town of the Person</p>
      <input type="text" placeholder="Enter Home Town" required/>
      <p style="margin-top: 10px">Purpose of Calling</p>
      <input type="text" placeholder="Enter purpose" required/>
      <p style="margin-top: 10px">Phone Number of the Person</p>
      <input type="text" placeholder="Enter Phone Numbeer" required/>
      <p style="margin-top: 10px">Email ID of the Person</p>
      <input type="text" placeholder="Enter Email ID" required/>
      <p style="margin-top: 10px">Category</p>
      <select class="category" required>
        <option value="orange" selected disabled>
          <span>Select Category</span>
        </option>
        <option value="black">
          <span>No Rush</span>
        </option>
        <option value="violet">
          <span>Important</span>
        </option>
        <option value="orange">
          <span>Emergency</span>
        </option>
        <option value="blue">
          <span>Urgent</span>
        </option></select
      ><br />

      <input
        class="submit"
        type="submit"
        value="Create Note"
      />
      <button style="margin-top: 10px" class="close">Close</button>
    </form>

    <script src="practice.js"></script>
  </body>
</html>
