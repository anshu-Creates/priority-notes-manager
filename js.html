<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="js.css" />
  </head>
  <body>
    <div class="notes">
      <nav class="nav">
        <button class="add button">Add</button>
      </nav>
      <div class="main">
        <h1 class="init">Nothing to See...</h1>
      </div>

      <div class="filter">
        <button class="norush">No Rush</button>
        <button class="important">Important</button>
        <button class="emergency">Emergency</button>
        <button class="urgent">Urgent</button>
      </div>
    </div>

    <form>
      <h1>New Note</h1>
      <p>Full Name of the Person</p>
      <input type="text" placeholder="Enter Full Name" />
      <p style="margin-top: 10px">Home Town of the Person</p>
      <input type="text" placeholder="Enter Home Town" />
      <p style="margin-top: 10px">Purpose of Calling</p>
      <input type="text" placeholder="Enter purpose" />
      <p style="margin-top: 10px">Phone Number of the Person</p>
      <input type="text" placeholder="Enter Phone Numbeer" />
      <p style="margin-top: 10px">Email ID of the Person</p>
      <input type="text" placeholder="Enter Email ID" />
      <p style="margin-top: 10px">Category</p>
      <select class="category">
        <option value="orange" selected disabled>
          <span>Select Category</span>
        </option>
        <option value="black">
          <span>No Rush</span>
        </option>
        <option value="violet">
          <span>Important</span>
        </option>
        <option value="orange">
          <span>Emergency</span>
        </option>
        <option value="blue">
          <span>Urgent</span>
        </option></select
      ><br />

      <button class="submit" type="submit">Create Note</button>
      <button style="margin-top: 10px" class="close" type="reset">Close</button>
    </form>

    <script src="js.js"></script>
  </body>
</html>
