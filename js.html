<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        font-family: cursive;
      }

      body {
        display: flex;
        justify-content: space-around;
        padding: 40px 0;
      }

      .notes {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .nav {
        display: flex;
        flex-direction: column;
      }

      .nav button {
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: white;
        border-radius: 50px;
        color: black;
        font-size: 15px;
      }

      .nav button:hover {
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: black;
        border-radius: 50px;
        color: white;
        font-size: 15px;
      }

      .main {
        width: 300px;
        border: none;
        border-radius: 10px;
        margin: 20px;
        padding: 20px;
        box-shadow: 0px 10px 20px rgb(187, 186, 186);
      }

      .main p {
        display: flex;
        justify-content: space-between;
        color: gray;
      }

      .main button {
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: white;
        border-radius: 50px;
        color: black;
        font-size: 15px;
      }

      .main button:hover {
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: black;
        border-radius: 50px;
        color: white;
        font-size: 15px;
      }

      .filter {
        display: flex;
        flex-direction: column;
      }

      .filter button {
        padding: 10px;
        margin: 5px;
        font-size: 15px;
      }

      .black {
        border: 2px solid black;
        background-color: white;
        color: gray;
        border-radius: 17px;
      }

      .black:hover {
        border: 2px solid gray;
        background-color: black;
        color: white;
        border-radius: 17px;
        transition: 0.3s;
      }

      .violet {
        border: 2px solid rgb(205, 8, 205);
        background-color: white;
        color: violet;
        border-radius: 17px;
      }

      .violet:hover {
        border: 2px solid violet;
        background-color: rgb(205, 8, 205);
        color: white;
        border-radius: 17px;
        transition: 0.3s;
      }

      .orange {
        border: 2px solid rgb(221, 148, 14);
        background-color: white;
        color: orange;
        border-radius: 17px;
      }

      .orange:hover {
        border: 2px solid orange;
        background-color: rgb(221, 148, 14);
        color: white;
        border-radius: 17px;
        transition: 0.3s;
      }

      .blue {
        border: 2px solid rgb(21, 21, 216);
        background-color: white;
        color: blue;
        border-radius: 17px;
      }

      .blue:hover {
        border: 2px solid blue;
        background-color: rgb(21, 21, 216);
        color: white;
        border-radius: 17px;
        transition: 0.3s;
      }

      form {
        display: flex;
        justify-content: center;
        flex-direction: column;
        width: 400px;
        border: 2px solid gray;
        padding: 10px;
        border-radius: 20px;
        display: none;
      }

      form input{
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: white;
        border-radius: 50px;
        color: black;
        font-size: 10px;
      }

      form p{
        padding-left: 10px;
        margin: 5px;
        font-size: 20px;
      }
      form button{
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: white;
        border-radius: 50px;
        color: black;
        font-size: 15px;
      }

      form button:hover {
        padding: 10px;
        margin: 5px;
        border: 2px solid black;
        background-color: black;
        border-radius: 50px;
        color: white;
        font-size: 15px;
      }

    </style>
  </head>
  <body>
    <div class="notes">
      <nav class="nav">
        <button class="add">Add</button>
        <button class="up">Up</button>
        <button class="down">Down</button>
      </nav>

      <div class="main">
        <h1>Name</h1>
        <p>Hometown : <span class="hometown">Hometown</span></p>
        <p>Purpose : <span>Purpose</span></p>
        <div>
          <button class="call">Call</button>
          <button class="msg">Message</button>
        </div>
      </div>

      <div class="filter">
        <button class="black">Black</button>
        <button class="violet">Violet</button>
        <button class="orange">Orange</button>
        <button class="blue">Blue</button>
      </div>
    </div>

    <form>
      <h1>New Note</h1>
      <p>Full Name</p>
      <input type="text" placeholder="Enter Full Name" />
      <p style="margin-top: 10px;">Home Town</p>
      <input type="text" placeholder="Enter Home Town" />
      <p style="margin-top: 10px;">Purpose</p>
      <input type="text" placeholder="Enter purpose" />
      <p style="margin-top: 10px;">Category</p>
      <div>
        <input type="radio" name="category" value="emergency" /><span style="color: orange;">Emergency</span><br />
        <input type="radio" name="category" value="important" /><span style="color: violet;">Important</span><br />
        <input type="radio" name="category" value="urgent" /><span style="color: blue;">Urgent</span><br />
        <input type="radio" name="category" value="not-imp" /><span style="color: black;">No Rush</span>
      </div><br>

      <input type="submit" value="Create Note" style="font-size: 15px; background-color: red; border: 2px solid red; color: white;" >
      <button style="margin-top: 10px;" class="close">Close</button>
    </form>

    <script src="practice.js"></script>
  </body>
</html>
